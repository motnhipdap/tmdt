spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}

  jpa:
    show-sql: false
    open-in-view: false

  devtools:
    restart:
      enabled: false
    livereload:
      enabled: false

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:redis}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:}
      ssl:
        enabled: ${SPRING_DATA_REDIS_SSL:true}

jwt:
  secret: ${JWT_SECRET}

management:
  server:
    port: ${PORT:8080}
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

logging:
  level:
    root: warn
    com.dev.dungcony: info

## ===== Tắt Swagger trên production =====
#springdoc:
#  api-docs:
#    enabled: false
#  swagger-ui:
#    enabled: false

# ===== Swagger / OpenAPI =====
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method
