spring.application.name=dungcony

# Database config
spring.datasource.url=jdbc:mysql://localhost:3307/db1?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA config
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Flyway config
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migration=true
# Tự động repair khi có lỗi checksum (development only)
flyway.repair-on-validate-error=true
# Tắt validation trong development (chỉ dùng khi đã sửa migration files)
# spring.flyway.validate-on-migrate=false
# Flyway logging
logging.level.org.flywaydb=DEBUG

# Mail config (Gmail example)
# Để sử dụng Gmail, bạn cần tạo App Password tại: https://myaccount.google.com/apppasswords
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Hoặc sử dụng các SMTP khác:
# Mailgun, SendGrid, AWS SES, etc.