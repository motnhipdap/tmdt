spring:
  application:
    name: dungcony

  profiles:
    active: dev

  flyway:
    locations: classpath:db/migration
    baseline-on-migration: false
    validate-on-migrate: true

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    from: ${MAIL_FROM:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  jpa:
    hibernate:
      ddl-auto: none

  devtools:
    restart:
      enabled: true
    livereload:
      enabled: true

logging:
  level:
    root: info
    com.dev.dungcony: debug
  file:
    name: logs/app.log

jwt:
  expiration: 300 # 5p
  refresh-expiration: 604800 # 7 ngày (s)

server:
  host: localhost

# ===== Swagger / OpenAPI =====
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method
